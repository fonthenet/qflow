name: Build iOS App Clip

on:
  workflow_dispatch:  # Manual trigger only
  push:
    paths:
      - 'apps/ios/**'

jobs:
  build:
    runs-on: macos-14  # M1 Mac runner (free for public repos, included mins for private)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: apps/ios/QueueFlow
        run: xcodegen generate

      - name: Build App Clip (Debug - no signing)
        working-directory: apps/ios/QueueFlow
        run: |
          xcodebuild build \
            -project QueueFlow.xcodeproj \
            -scheme QueueFlowClip \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Build Companion App (Debug - no signing)
        working-directory: apps/ios/QueueFlow
        run: |
          xcodebuild build \
            -project QueueFlow.xcodeproj \
            -scheme QueueFlow \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Build Success
        run: echo "✅ Both QueueFlow app and App Clip built successfully!"
