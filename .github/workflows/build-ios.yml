name: Build iOS App Clip

on:
  workflow_dispatch:  # Manual trigger only
  push:
    paths:
      - 'apps/ios/**'

jobs:
  build:
    runs-on: macos-14  # M1 Mac runner (free for public repos, included mins for private)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install XcodeGen (latest)
        run: brew install xcodegen || brew upgrade xcodegen

      - name: Generate Xcode Project
        working-directory: apps/ios/QueueFlow
        run: xcodegen generate

      - name: Build App Clip (Debug - no signing)
        working-directory: apps/ios/QueueFlow
        run: |
          xcodebuild build \
            -project QueueFlow.xcodeproj \
            -scheme QueueFlowClip \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Build Companion App (Debug - no signing)
        working-directory: apps/ios/QueueFlow
        run: |
          xcodebuild build \
            -project QueueFlow.xcodeproj \
            -scheme QueueFlow \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Build Success
        run: echo "✅ Both QueueFlow app and App Clip built successfully!"
