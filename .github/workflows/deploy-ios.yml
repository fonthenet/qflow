name: Deploy iOS to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'apps/expo/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/expo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: eas build --platform ios --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --wait

      - name: Submit to TestFlight
        run: eas submit --platform ios --latest --non-interactive
