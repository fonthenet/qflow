<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Qflo Station</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; overflow: hidden; }
    #root { height: 100vh; }
    /* Bottom bar styles are in the shared Station CSS bundle */
  </style>
<script>
// ── Hybrid Bridge — auto-detects local station vs remote Supabase ──
(function() {
  window.__QF_HTTP_MODE__ = true;
  var API = window.location.origin;
  var mode = 'remote'; // default

  function get(path) {
    return fetch(API + path, { credentials: 'include' }).then(function(r) {
      if (r.status === 401) { window.location.href = '/login?redirect=/station'; return null; }
      if (!r.ok) { console.error('[qf-bridge] GET ' + path + ' → ' + r.status); }
      return r.json();
    });
  }
  function post(path, body) {
    return fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'include',
    }).then(function(r) {
      if (r.status === 401) { window.location.href = '/login?redirect=/station'; return null; }
      if (!r.ok) { console.error('[qf-bridge] POST ' + path + ' → ' + r.status); }
      return r.json();
    });
  }

  // Remote API helpers (use /api/station?action=...)
  function rGet(action, params) {
    var qs = 'action=' + action;
    if (params) Object.keys(params).forEach(function(k) { qs += '&' + k + '=' + encodeURIComponent(params[k]); });
    return get('/api/station?' + qs);
  }
  function rPost(action, body) {
    body.action = action;
    return post('/api/station', body);
  }

  // Ticket change listeners (polling-powered for remote)
  var ticketListeners = [];
  var syncListeners = [];
  var errorListeners = [];
  var pollInterval = null;

  function startPolling() {
    if (pollInterval) return;
    pollInterval = setInterval(function() {
      ticketListeners.forEach(function(cb) { try { cb(); } catch(e) {} });
    }, 3000);
  }
  startPolling();

  // Language cycle: en → fr → ar → en
  var langs = ['en', 'fr', 'ar'];
  var langLabels = { en: 'EN', fr: 'FR', ar: 'عر' };
  var currentLang = localStorage.getItem('qflo_station_locale') || 'ar';

  // Show mode badge + language toggle after load
  window.addEventListener('load', function() {
    var bar = document.createElement('div');
    bar.id = 'qf-bottom-bar';

    var langBtn = document.createElement('button');
    langBtn.id = 'qf-lang-toggle';
    langBtn.textContent = langLabels[currentLang] || 'EN';
    langBtn.onclick = function() {
      var idx = langs.indexOf(currentLang);
      currentLang = langs[(idx + 1) % langs.length];
      localStorage.setItem('qflo_station_locale', currentLang);
      langBtn.textContent = langLabels[currentLang];
      // Trigger Station's locale change
      if (window.qf && window.qf.settings && window.qf.settings._localeCallbacks) {
        window.qf.settings._localeCallbacks.forEach(function(cb) { cb(currentLang); });
      }
      // Also update HTML dir
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    };

    var badge = document.createElement('div');
    badge.id = 'qf-mode-badge';
    badge.className = mode;
    badge.textContent = mode === 'local' ? '📡 Local' : '🌐 Remote';

    bar.appendChild(langBtn);
    bar.appendChild(badge);
    document.body.appendChild(bar);
  });

  window.qf = {
    getConfig: function() { return Promise.resolve({ APP_VERSION: 'web', mode: mode }); },

    db: {
      getTickets: function(officeId, statuses) {
        var ids = Array.isArray(officeId) ? officeId.join(',') : officeId;
        return rGet('tickets', { officeIds: ids, statuses: statuses.join(',') });
      },
      createTicket: function(ticket) {
        console.log('[qf-bridge] createTicket input:', JSON.stringify(ticket));
        return rPost('create-ticket', {
          officeId: ticket.office_id,
          departmentId: ticket.department_id,
          serviceId: ticket.service_id,
          customerName: ticket.customer_data?.name || '',
          customerPhone: ticket.customer_data?.phone || '',
          customerReason: ticket.customer_data?.reason || '',
          priority: ticket.priority || 0,
          source: ticket.source || 'in_house',
        }).then(function(r) {
          console.log('[qf-bridge] createTicket raw response:', JSON.stringify(r));
          var result = r && r.ticket ? r.ticket : r;
          console.log('[qf-bridge] createTicket unwrapped:', JSON.stringify(result));
          return result;
        });
      },
      updateTicket: function(ticketId, updates) {
        return rPost('update-ticket', { ticketId: ticketId, updates: updates });
      },
      callNext: function(officeId, deskId, staffId) {
        return rPost('call-next', { officeId: officeId, deskId: deskId, staffId: staffId });
      },
      query: function(table, officeIds) {
        return rGet('query', { table: table, officeIds: officeIds.join(',') });
      },
    },

    sync: {
      getStatus: function() { return Promise.resolve({ isOnline: true, pendingCount: 0, lastSyncAt: new Date().toISOString() }); },
      forceSync: function() { return Promise.resolve(); },
      getPendingDetails: function() { return Promise.resolve([]); },
      discardItem: function() { return Promise.resolve(); },
      discardAll: function() { return Promise.resolve(); },
      retryItem: function() { return Promise.resolve(); },
      onStatusChange: function(cb) {
        syncListeners.push(cb);
        setTimeout(function() { cb('online'); }, 100);
        return function() { syncListeners = syncListeners.filter(function(c) { return c !== cb; }); };
      },
      onProgress: function(cb) { return function() {}; },
      onError: function(cb) {
        errorListeners.push(cb);
        return function() { errorListeners = errorListeners.filter(function(c) { return c !== cb; }); };
      },
    },

    session: {
      save: function() { return Promise.resolve(); },
      load: function() { return rGet('session'); },
      clear: function() { return rPost('logout', {}).then(function() { window.location.href = '/login'; }); },
    },

    settings: {
      _localeCallbacks: [],
      getLocale: function() { return Promise.resolve(localStorage.getItem('qflo_station_locale') || 'ar'); },
      setLocale: function(locale) {
        localStorage.setItem('qflo_station_locale', locale);
        currentLang = locale;
        var btn = document.getElementById('qf-lang-toggle');
        if (btn) btn.textContent = langLabels[locale] || locale.toUpperCase();
        return Promise.resolve(locale);
      },
      onLocaleChange: function(cb) {
        window.qf.settings._localeCallbacks.push(cb);
        return function() { window.qf.settings._localeCallbacks = window.qf.settings._localeCallbacks.filter(function(c) { return c !== cb; }); };
      },
    },

    isOnline: function() { return Promise.resolve(true); },

    auth: {
      onSessionExpired: function(cb) { return function() {}; },
    },

    tickets: {
      onChange: function(cb) {
        ticketListeners.push(cb);
        return function() { ticketListeners = ticketListeners.filter(function(c) { return c !== cb; }); };
      },
    },

    activity: {
      getRecent: function(officeId, limit) {
        return rGet('activity', { officeId: officeId, limit: limit || 20 });
      },
    },

    debug: {
      dbStats: function() { return Promise.resolve({}); },
    },

    getKioskPort: function() { return Promise.resolve(location.port || (location.protocol === 'https:' ? 443 : 80)); },

    kiosk: {
      _cache: null,
      _fetch: function() {
        if (window.qf.kiosk._cache) return window.qf.kiosk._cache;
        window.qf.kiosk._cache = rGet('kiosk-info');
        return window.qf.kiosk._cache;
      },
      getUrl: function() {
        // Return /kiosk path so Station's .replace('/kiosk','/station') and .replace('/kiosk','/display') work
        return window.qf.kiosk._fetch().then(function(d) {
          if (!d || !d.kioskUrl) return null;
          // Extract base origin and return with /kiosk path
          try { var u = new URL(d.kioskUrl); return u.origin + '/kiosk'; } catch(e) { return null; }
        });
      },
      getLocalIP: function() { return Promise.resolve(null); },
    },

    links: {
      getPublic: function() {
        return window.qf.kiosk._fetch().then(function(d) {
          return {
            kioskUrl: d && d.kioskUrl ? d.kioskUrl : null,
            displayUrl: d && d.displayUrl ? d.displayUrl : null,
          };
        });
      },
    },

    org: {
      getBranding: function() { return rGet('branding'); },
    },

    updater: {
      onStatusChange: function() { return function() {}; },
      getStatus: function() { return Promise.resolve({ status: 'idle', version: null, progress: null, message: null }); },
    },

    license: {
      activate: function() { return Promise.resolve({ ok: false, error: 'Not available in remote mode' }); },
      getStatus: function() { return Promise.resolve({ licensed: true, machineId: 'web-remote' }); },
    },
  };
})();
</script>
  <script type="module" crossorigin src="/station/assets/index--P26Av_s.js"></script>
  <link rel="stylesheet" crossorigin href="/station/assets/index-C25sHaDN.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
