<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Take a Ticket</title>
  <link rel="stylesheet" href="/kiosk/kiosk.css?v=6">
</head>
<body>
  <div class="kiosk" id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh">
      <div style="text-align:center;color:var(--text3)">
        <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px"></div>
        <span id="kiosk-loading">Loading&hellip;</span>
      </div>
    </div>
  </div>
  <script src="/kiosk/kiosk.js?v=6"></script>
</body>
</html>
