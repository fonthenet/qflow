name: QueueFlow
options:
  bundleIdPrefix: com.queueflow
  deploymentTarget:
    iOS: "16.4"
  xcodeVersion: "15.0"
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: W69MRY2826
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:

  # ─────────────────────────────────────────
  # Companion App (required by Apple)
  # ─────────────────────────────────────────
  QueueFlow:
    type: application
    platform: iOS
    sources:
      - path: QueueFlow
        type: group
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: W69MRY2826
      SystemCapabilities:
        com.apple.AssociatedDomains:
          enabled: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.queueflow.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: QueueFlow/QueueFlow.entitlements
      properties:
        com.apple.developer.associated-domains:
          - appclips:qflo.net
    dependencies:
      - target: QueueFlowClip
        embed: true

  # ─────────────────────────────────────────
  # App Clip (the star of the show)
  # ─────────────────────────────────────────
  QueueFlowClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: QueueFlowClip
        type: group
      - path: QueueFlowShared
        type: group
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: W69MRY2826
      SystemCapabilities:
        com.apple.AssociatedDomains:
          enabled: 1
        com.apple.Push:
          enabled: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.queueflow.app.QueueFlowClip
        INFOPLIST_FILE: QueueFlowClip/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - target: QueueFlowLiveActivity
        embed: true
    entitlements:
      path: QueueFlowClip/QueueFlowClip.entitlements
      properties:
        com.apple.developer.associated-domains:
          - appclips:qflo.net
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.queueflow.app
        aps-environment: development

  QueueFlowLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - path: QueueFlowLiveActivity
        type: group
      - path: QueueFlowShared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.queueflow.app.QueueFlowClip.LiveActivity
        INFOPLIST_FILE: QueueFlowLiveActivity/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        PRODUCT_NAME: QueueFlowLiveActivity
    entitlements:
      path: QueueFlowLiveActivity/QueueFlowLiveActivity.entitlements
      properties:
        com.apple.developer.on-demand-install-capable: true

schemes:
  QueueFlow:
    build:
      targets:
        QueueFlow: all
  QueueFlowClip:
    build:
      targets:
        QueueFlowClip: all
    run:
      environmentVariables:
        - variable: _XCAppClipURL
          value: "https://qflo.net/q/test-token"
          isEnabled: true
